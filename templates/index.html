<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prédiction du Diabète – Accueil</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <header>
    <nav>
      <a href="/">Accueil</a>
      <a href="/about">À propos</a>
    </nav>
    <h1>🩺 Prédiction du Diabète</h1>
    <p class="subtitle">Entrez les données cliniques du patient pour obtenir une prédiction.</p>
  </header>

  <main>
    <form action="/predict" method="post" class="prediction-form">
      <div class="form-grid">

        <div class="form-group">
          <label for="pregnancies">Nombre de grossesses</label>
          <input type="number" id="pregnancies" name="pregnancies"
                 min="0" max="20" step="1" value="0" required />
        </div>

        <div class="form-group">
          <label for="glucose">Glucose (mg/dL)</label>
          <input type="number" id="glucose" name="glucose"
                 min="0" max="300" step="0.1" value="120" required />
        </div>

        <div class="form-group">
          <label for="blood_pressure">Pression artérielle (mm Hg)</label>
          <input type="number" id="blood_pressure" name="blood_pressure"
                 min="0" max="200" step="0.1" value="70" required />
        </div>

        <div class="form-group">
          <label for="skin_thickness">Épaisseur de la peau (mm)</label>
          <input type="number" id="skin_thickness" name="skin_thickness"
                 min="0" max="100" step="0.1" value="20" required />
        </div>

        <div class="form-group">
          <label for="insulin">Insuline (mu U/ml)</label>
          <input type="number" id="insulin" name="insulin"
                 min="0" max="900" step="0.1" value="80" required />
        </div>

        <div class="form-group">
          <label for="bmi">IMC (kg/m²)</label>
          <input type="number" id="bmi" name="bmi"
                 min="0" max="70" step="0.1" value="25.0" required />
        </div>

        <div class="form-group">
          <label for="diabetes_pedigree_function">Fonction pédigrée du diabète</label>
          <input type="number" id="diabetes_pedigree_function"
                 name="diabetes_pedigree_function"
                 min="0" max="3" step="0.001" value="0.5" required />
        </div>

        <div class="form-group">
          <label for="age">Âge (années)</label>
          <input type="number" id="age" name="age"
                 min="0" max="120" step="1" value="30" required />
        </div>

      </div>

      <button type="submit" class="btn-predict">Prédire</button>
    </form>
  </main>

  <footer>
    <p>Projet de prédiction du diabète — Programmation Orientée Objet</p>
  </footer>
</body>
</html>
