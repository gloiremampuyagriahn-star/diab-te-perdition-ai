<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diabetes AI - Statistiques</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <h2 class="nav-brand">
          <i class="fas fa-heartbeat"></i>
          Diabetes AI
        </h2>
        <div class="nav-menu">
          <a href="dashboard.html" class="nav-link">
            <i class="fas fa-chart-line nav-icon"></i>
            <span>Prédiction</span>
          </a>
          <a href="statistics.html" class="nav-link active">
            <i class="fas fa-chart-bar nav-icon"></i>
            <span>Statistiques</span>
          </a>
          <a href="#" class="nav-link" onclick="logoutUser(); return false;">
            <i class="fas fa-sign-out-alt nav-icon"></i>
            <span>Déconnexion</span>
          </a>
        </div>
      </div>
    </nav>

    <div class="main-content">
      <div class="container wide">
        <div class="header-section">
          <h1>
            <i class="fas fa-chart-bar"></i>
            Statistiques & Historique
          </h1>
          <p id="welcome-text" class="subtitle"></p>
        </div>

        <div class="stats-summary">
          <div class="stat-card">
            <i class="fas fa-list-ol stat-icon"></i>
            <div class="stat-info">
              <h3 id="total-predictions">0</h3>
              <p>Analyses effectuées</p>
            </div>
          </div>
          <div class="stat-card">
            <i class="fas fa-check-circle stat-icon" style="color: #10b981;"></i>
            <div class="stat-info">
              <h3 id="negative-count">0</h3>
              <p>Résultats négatifs</p>
            </div>
          </div>
          <div class="stat-card">
            <i class="fas fa-exclamation-triangle stat-icon" style="color: #ef4444;"></i>
            <div class="stat-info">
              <h3 id="positive-count">0</h3>
              <p>Résultats positifs</p>
            </div>
          </div>
        </div>

        <div class="history-section">
          <h3>
            <i class="fas fa-history"></i>
            Historique des analyses
          </h3>
          <div id="history-table-container">
            <p class="loading">Chargement...</p>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      loadStatistics();
    </script>
  </body>
</html>
